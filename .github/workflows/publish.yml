name: Publish Python Package to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    name: "Build · ubuntu-latest · Python 3.10"
    runs-on: ubuntu-latest

    steps:
      - name: "[setup] Checkout repository"
        uses: actions/checkout@v4

      - name: "[setup] Set up Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: "[setup] Install build frontend"
        run: pip install --upgrade build

      - name: "[build] Build sdist and wheel from pyproject.toml"
        run: python -m build

      - name: "[artifact] Upload dist to workflow"
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    name: "Publish · PyPI"
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/opfunu-core
    permissions:
      id-token: write

    steps:
      - name: "[setup] Download dist artifact"
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: "[publish] Push to PyPI via trusted publishing"
        uses: pypa/gh-action-pypi-publish@release/v1