name: Tests & Publishes to PyPI

on:
  release:
    types: [published]
  push:
    branches:
      - master
  pull_request:
    branches:
      - "*"

env:
  PROJECT_NAME: opfunu_core

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 9
          submodules: false

      - name: Use Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - uses: actions/cache@v4
        id: depcache
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ matrix.python-version }}-

      - name: Install package and dev dependencies
        run: |
          pip install -e ".[dev]"
          pip install flake8

      - name: Run Flake8
        run: flake8 $PROJECT_NAME/ tests/
        continue-on-error: true

      - name: Run MyPy
        run: mypy $PROJECT_NAME/
        continue-on-error: true

      - name: Run Pytest
        run: |
          pytest \
            --junitxml=junit/pytest-results-${{ matrix.python-version }}.xml \
            --cov=$PROJECT_NAME \
            --cov-report=xml \
            --cov-report=term-missing
        continue-on-error: true

      - name: Upload pytest results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: junit/pytest-results-${{ matrix.python-version }}.xml
        if: always()

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
        if: always()

      - name: Create distribution package
        run: |
          pip install build
          python -m build
        if: matrix.python-version == '3.11'

      - name: Validate distribution package
        run: twine check dist/*
        if: matrix.python-version == '3.11'
        continue-on-error: true

      - name: Upload distribution package
        uses: actions/upload-artifact@v4
        with:
          name: dist-package-3.11
          path: dist
        if: matrix.python-version == '3.11'

  pypy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pypy-version: ["pypy3.10", "pypy3.11"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 9
          submodules: false

      - name: Use ${{ matrix.pypy-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.pypy-version }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.pypy-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ matrix.pypy-version }}-

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"
        continue-on-error: true

      - name: Run Pytest
        run: |
          pytest \
            --junitxml=junit/pytest-results-${{ matrix.pypy-version }}.xml \
            --cov=$PROJECT_NAME \
            --cov-report=xml \
            --cov-report=term-missing
        continue-on-error: true

      - name: Upload pytest results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.pypy-version }}
          path: junit/pytest-results-${{ matrix.pypy-version }}.xml
        if: always()

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-package-3.11
          path: dist

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          attestations: false

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          attestations: true